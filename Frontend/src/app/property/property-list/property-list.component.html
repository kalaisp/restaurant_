<!-- ===== SEARCH & FILTER BAR ===== -->
<div class="filter-bar">
  <div class="filter-inner">

    <!-- City Search -->
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input
        class="search-input"
        [(ngModel)]="City"
        placeholder="Search by city..."
        (keyup.enter)="onCityFilter()">
    </div>

    <!-- Buttons -->
    <button class="btn-search" type="button" (click)="onCityFilter()">
      Search
    </button>
    <button class="btn-clear" type="button" (click)="onCityFilterClear()">
      Clear
    </button>

    <!-- Sort -->
    <div class="sort-wrap">
      <span class="sort-label">Sort by</span>
      <select class="sort-select" [(ngModel)]="SortbyParam">
        <option value="City">City</option>
        <option value="Price">Price</option>
      </select>
      <button class="sort-dir-btn" type="button" (click)="onSortDirection()">
        <span *ngIf="SortDirection === 'asc'">&#8593; Asc</span>
        <span *ngIf="SortDirection === 'desc'">&#8595; Desc</span>
      </button>
    </div>

  </div>
</div>

<!-- ===== LOADING ===== -->
<div *ngIf="isLoading" class="loading-wrap">
  <div class="spinner"></div>
  <p>Loading properties...</p>
</div>

<!-- ===== ERROR ===== -->
<div *ngIf="hasError" class="error-wrap">
  &#9888; Failed to load properties. Please try again.
</div>

<!-- ===== PROPERTY GRID ===== -->
<div *ngIf="!isLoading && !hasError" class="property-section">

  <!-- Results count -->
  <p class="results-count">
    Showing <strong>
      {{ (properties | filter: City : 'City').length }}
    </strong> properties
  </p>

  <div class="property-grid">
    <div
      *ngFor="let property of properties
        | filter: City : 'City'
        | sort: [SortbyParam, SortDirection]"
      class="property-item">
      <app-property-card [property]="property"></app-property-card>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state"
       *ngIf="(properties | filter: City : 'City').length === 0">
    <p class="empty-icon">&#127968;</p>
    <h5>No properties found</h5>
    <p>Try searching a different city</p>
    <button class="btn-search" (click)="onCityFilterClear()">
      Clear Search
    </button>
  </div>

</div>
